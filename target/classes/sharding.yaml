mode:
  type: Memory

dataSources:
  ds0:
    dataSourceClassName: com.zaxxer.hikari.HikariDataSource
    driverClassName: com.mysql.cj.jdbc.Driver
    jdbcUrl: jdbc:mysql://127.0.0.1:3306/payment_center?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root
    maximumPoolSize: 40
    minimumIdle: 10
    connectionTimeout: 3000

rules:
  - !SHARDING
    tables:
      pay_order:
        actualDataNodes: ds0.pay_order_${0..63}
        tableStrategy:
          standard:
            shardingColumn: merchant_no
            shardingAlgorithmName: pay_order_hash_mod
    shardingAlgorithms:
      pay_order_hash_mod:
        type: INLINE
        props:
          algorithm-expression: pay_order_${Math.abs(merchant_no.hashCode()) % 64}

  - !SINGLE
    tables:
      - ds0.*

props:
  sql-show: true
